CONFIG_ZMK_KEYBOARD_NAME="minimal-keys"

# Bluetooth & NFC設定
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y

# SPI & インプット基本設定
CONFIG_SPI=y
CONFIG_INPUT=y

# 【ZMK本家仕様】トラックボール（ポインティング）有効化設定
CONFIG_ZMK_POINTING=y

# バッテリー報告設定
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_BT_BAS=y

# ZMK Studio設定
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# --- 以下のRGBLED Widget設定は一時的に無効化（エラー回避のため） ---
# CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
# CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10
# CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y

# --- Bluetooth接続安定化の設定（右手・親機専用） ---
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# --- 【超重要】勝手に切断されるスリープ機能を完全にオフにする ---
CONFIG_ZMK_SLEEP=n
