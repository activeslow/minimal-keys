CONFIG_ZMK_KEYBOARD_NAME="minimal-keys"

# Bluetooth & NFC設定
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y

# SPI & インプット基本設定
CONFIG_SPI=y
CONFIG_INPUT=y

# 【ZMK本家仕様】トラックボール（ポインティング）有効化設定
CONFIG_ZMK_POINTING=y

# バッテリー報告設定
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_BT_BAS=y

# ZMK Studio設定
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# --- Bluetooth接続安定化の設定 ---
# Bluetoothの送信出力を最大（+8dBm）に引き上げて電波強度を上げる
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ZMKの実験的なBLE接続最適化を有効にする（OSからの意図しない切断を防ぐ）
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
